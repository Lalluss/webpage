<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mucify</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#07141f;
    color:white;
}

.header{
    padding:20px;
    text-align:center;
}

.brand{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

.brand-icon{
width:50px;
height:50px;
object-fit:contain;
}

.logo-text{
font-family:'Lobster',cursive;
font-size:38px;

background:linear-gradient(
90deg,
#f7d774,
#d4af37,
#fff0b3,
#d4af37
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 10px rgba(212,175,55,.8),
0 0 25px rgba(212,175,55,.6);

margin:0;
}
.title{
    font-size:32px;
    font-weight:bold;
    color:#00d4ff;
    text-shadow:0 0 15px #00d4ff;
}

.nav{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:15px;
}

.nav a{
    text-decoration:none;
    color:white;
    background:#0b2235;
    padding:12px 20px;
    border-radius:12px;
    border:1px solid #00d4ff;
}

.search-box{
    padding:20px;
}

.search-box input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:16px;
}

.search-btn{
    width:100%;
    margin-top:10px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#00d4ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.section-title{
    padding-left:20px;
    color:#00d4ff;
}
.song-card{
  display:flex;
  align-items:center;
  gap:10px;
  background:#08233f;
  padding:10px;
  margin:10px 0;
  border-radius:12px;
}

.song-thumb{
  width:60px;
  height:60px;
  border-radius:10px;
  object-fit:cover;
}

.song-info{
  flex:1;
}

.play-btn{
  background:#00d4ff;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  font-weight:bold;
    }
#songs{
    padding:15px;
}

.song-card{
    display:flex;
    align-items:center;
    gap:15px;
    background:#0b2235;
    padding:12px;
    border-radius:15px;
    margin-bottom:10px;
    border:1px solid rgba(0,212,255,.3);
}

.song-card img{
    width:65px;
    height:65px;
    border-radius:10px;
    object-fit:cover;
}

.song-info{
    flex:1;
}

.song-title{
    font-size:17px;
    font-weight:bold;
}

.song-artist{
    opacity:.7;
    font-size:14px;
}

.play-btn{
    border:none;
    background:#00d4ff;
    color:black;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.player{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#081827;
    padding:10px;
    border-top:1px solid #00d4ff;
}

audio{
    width:100%;
}

.footer-space{
    height:100px;
}

</style>
</head>

<body>

<div class="header">

<div class="brand">

<img
src="file_0000000048a47207a0c76a45dce92df8.png"
class="brand-icon"
>

<h1 class="logo-text">
Mucify
</h1>

</div>

<div class="nav">

<a href="index.html">
🏠 Home
</a>

<a href="bot.html">
🤖 Bot
</a>

</div>

</div>

<div class="search-box">

<input
id="searchInput"
placeholder="Search any song..."
>

<button
class="search-btn"
onclick="searchSong()"
>
🔍 Search Song
</button>

</div>

<h2 class="section-title">
Featured Songs
</h2>
<div id="featuredSongs"></div>
    
<div id="songs"></div>

<div class="footer-space"></div>

<div class="player">

<div id="nowPlaying">
No song selected
</div>

<audio
id="audioPlayer"
controls>
</audio>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
