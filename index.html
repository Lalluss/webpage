<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Codec Botz</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>

<script>
if (window.Telegram?.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
}
</script>
    
body{
    margin:0;
    background:#07141f;
    color:white;
    font-family:Arial,sans-serif;
}

.header{
    text-align:center;
    padding:30px;
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid #00d4ff;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        box-shadow:0 0 10px #00d4ff;
    }
    to{
        box-shadow:0 0 35px #00d4ff;
    }
}

.card{
    margin:20px;
    padding:25px;
    border-radius:25px;
    background:rgba(8,35,63,.9);
    border:1px solid rgba(0,212,255,.3);
    box-shadow:0 0 25px rgba(0,212,255,.25);
    backdrop-filter:blur(10px);
}

.btn{
    display:block;
    text-decoration:none;
    text-align:center;
    padding:18px;
    margin-top:15px;
    border-radius:18px;
    color:white;
    font-weight:bold;
    font-size:20px;
    border:2px solid rgba(255,255,255,.1);
    transition:.3s;
}

.btn:hover{
    transform:scale(1.03);
}

.open{
    background:linear-gradient(
        135deg,
        #0f3f47,
        #1e6d78
    );

    border:2px solid #31e8ff;

    box-shadow:
    0 0 15px rgba(49,232,255,.4),
    inset 0 0 10px rgba(49,232,255,.2);
}

.group{
    background:linear-gradient(
        135deg,
        #1f5f2f,
        #2fa64b
    );

    border:2px solid #5fff87;

    box-shadow:
    0 0 15px rgba(95,255,135,.4),
    inset 0 0 10px rgba(95,255,135,.2);
}

.support{
    background:linear-gradient(
        135deg,
        #b96f00,
        #ff9d00
    );

    border:2px solid #ffd166;

    box-shadow:
    0 0 15px rgba(255,209,102,.4),
    inset 0 0 10px rgba(255,209,102,.2);
}

.footer{
    text-align:center;
    margin-top:30px;
    opacity:.7;
}

</style>
</head>

<body>

<div class="header">

<img
class="logo"
src="IMG_20260611_224214_926.jpg"
>

<h1>『 Codec Botz 』</h1>

<p>
Music Downloader Bot 
</p>

</div>

<div class="card">

<h2>AnnaBen</h2>

<p>
Download Music And videos
From youtube.
</p>

<a
class="btn open"
href="https://t.me/Venni_la_musicbot"
>
🍁 Open Bot
</a>

<a
class="btn group"
href="https://t.me/Lallu_t_g"
>
😎 Developer
</a>

<a
class="btn support"
href="https://t.me/Code_cSupport"
>
🌹 Codec Botz
</a>

</div>

<div class="footer">
Made With ❤️ By Lallu_tg
</div>
<script>
if (window.Telegram?.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
}
</script>
</body>
</html>
